<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妙麗年齡計算機</title>

<!--  放入這三行開始 -->
<link rel="icon" type="image/png" href="./icon.png">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
<!--  放入這三行結束 -->

<style>
*,*:before,*:after{ box-sizing:border-box; }

:root {
  --ios-blue:#007aff;
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#f2f2f7,#e5e5ea);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 卡片 */
.phone{
  width:360px;
  padding:24px;
  border-radius:28px;
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

/* 標題 */
h1{
  text-align:center;
  font-size:20px;
  margin-bottom:10px;
}

/* 狗 */
.dog{max-width:80%;margin:0 auto;}
.dog-img{width:100%;}

/* 輸入 */
input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ddd;
  margin-bottom:16px;
  font-size:16px;
}

/* 按鈕 */
button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:none;
  background:var(--ios-blue);
  color:#fff;
  font-size:16px;
}

button:active{
  transform:scale(0.96);
}

/* 結果 */
.result{
  margin-top:20px;
  padding:16px;
  border-radius:16px;
  background:#f9f9fb;
  display:none;
  animation:slideUp .4s ease;
}

.error{
  color:red;
  text-align:center;
}

/* 動畫 */
@keyframes slideUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="phone">

  <div class="dog">
    <img src="dog.png" alt="妙麗頭像" class="dog-img">
  </div>

  <h1>妙麗年齡計算機</h1>

  <input type="date" id="birthDate">

  <button onclick="calculateAge()">計算年齡</button>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <p>🐾 妙麗現在的年齡：<span id="dogAge"></span></p>
    <p>👤 換算成人類年齡：約 <span id="humanAge"></span> 歲</p>
  </div>

</div>

<script>
const input = document.getElementById("birthDate");

// 限制不能選未來
const todayStr = new Date().toISOString().split("T")[0];
input.setAttribute("max", todayStr);

// Enter 直接算
input.addEventListener("keydown", e=>{
  if(e.key==="Enter") calculateAge();
});

// 輸入時清錯誤
input.addEventListener("input", ()=>{
  document.getElementById("error").textContent="";
});

function calculateAge(){
  const value = input.value;
  localStorage.setItem("dogBirthDate", value);
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  error.textContent="";
  result.style.display="none";

  if(!value){
    error.textContent="請選擇出生日期";
    return;
  }

  const birth=new Date(value);
  const today=new Date();

  let y=today.getFullYear()-birth.getFullYear();
  let m=today.getMonth()-birth.getMonth();
  let d=today.getDate()-birth.getDate();

  if(d<0){
    m--;
    d+=30;
  }
  if(m<0){
    y--;
    m+=12;
  }

  // 人類年齡（AVMA）
  let humanAge=0;
  if(y<=1){
    humanAge=15;
  }else if(y===2){
    humanAge=24;
  }else{
    humanAge=24+(y-2)*5;
  }

  document.getElementById("dogAge").textContent =
    `${y} 年 ${m} 個月 ${d} 天`;

  document.getElementById("humanAge").textContent =
    humanAge;

  result.style.display="block";
}

// 讀取 localStorage
window.addEventListener("load", () => {
  const savedDate = localStorage.getItem("dogBirthDate");
  if (savedDate) {
    const input = document.getElementById("birthDate");
    input.value = savedDate;

    // 自動計算（可選）
    calculateAge();
  }
});
</script>

</body>
</html>
